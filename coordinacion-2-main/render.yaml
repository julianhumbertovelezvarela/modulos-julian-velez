services:
  - type: web
    name: coordinacion-medica-hdsar
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: "ESE Hospital Roldanillo"
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
